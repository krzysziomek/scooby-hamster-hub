name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static SPA
        run: bun run build
        env:
          NODE_ENV: production

      # TanStack Start emits a Cloudflare worker fetch handler for SSR. We
      # invoke it once at build time to prerender "/" into a real static
      # dist/client/index.html that GitHub Pages can serve directly. The
      # 404.html copy makes SPA deep-links work on github.io.
      - name: Prerender static SPA
        run: node scripts/prerender.mjs
        env:
          SITE_URL: https://scooby.boo/

      - name: Set artifact dir
        run: echo "DIST=dist/client" >> $GITHUB_ENV

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIST }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
